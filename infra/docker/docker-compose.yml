version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evaluacion
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file: ../../.env
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    env_file: ../../.env
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pg_data:
